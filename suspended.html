<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Suspended — Callahan Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.cdnfonts.com/css/sf-pro-display');

    :root {
      --black: #0a0a0a;
      --white: #fafafa;
      --gray-light: #f2f2f2;
      --gray-mid: #d1d1d1;
      --gray-text: #6e6e73;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* NOISE TEXTURE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 10;
    }

    /* RADIAL GLOW */
    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* GRID LINES */
    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at 50% 40%, black 20%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 40%, black 20%, transparent 75%);
    }

    /* MAIN CONTENT */
    .content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 24px;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* STATUS BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 980px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 36px;
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* HEADING */
    h1 {
      font-size: clamp(40px, 5.5vw, 68px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.08;
      color: var(--white);
      white-space: nowrap;
      margin-bottom: 20px;
      animation: fadeUp 0.9s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    h1 em {
      font-style: normal;
      color: rgba(255,255,255,0.2);
    }

    /* DIVIDER LINE */
    .line {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 0 auto 20px;
      animation: fadeUp 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* BODY TEXT */
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.35);
      line-height: 1.6;
      letter-spacing: -0.01em;
      max-width: 360px;
      margin-bottom: 32px;
      animation: fadeUp 0.9s 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* CTA */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--black);
      padding: 11px 22px;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: -0.2px;
      transition: opacity 0.2s;
      animation: fadeUp 0.9s 0.28s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn:hover { opacity: 0.82; }

    .btn svg {
      transition: transform 0.2s;
    }

    .btn:hover svg { transform: translateX(3px); }

    /* FOOTER BAR */
    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.05);
      z-index: 5;
      animation: fadeUp 0.9s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-logo img {
      height: 18px;
      filter: invert(1);
      opacity: 0.5;
    }

    .footer-logo span {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: rgba(255,255,255,0.3);
    }

    .footer-right {
      font-size: 12px;
      color: rgba(255,255,255,0.18);
      letter-spacing: -0.01em;
    }

    /* CORNER ACCENTS */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      z-index: 5;
      opacity: 0.12;
    }

    .corner-tl { top: 24px; left: 24px; border-top: 1px solid white; border-left: 1px solid white; }
    .corner-tr { top: 24px; right: 24px; border-top: 1px solid white; border-right: 1px solid white; }
    .corner-bl { bottom: 72px; left: 24px; border-bottom: 1px solid white; border-left: 1px solid white; }
    .corner-br { bottom: 72px; right: 24px; border-bottom: 1px solid white; border-right: 1px solid white; }

    @media (max-width: 600px) {
      .footer-bar { padding: 18px 24px; }
      .corner { display: none; }
    }
  </style>
</head>
<body>

  <div class="glow"></div>
  <div class="grid-bg"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <div class="badge">
      <span class="badge-dot"></span>
      Account Suspended
    </div>

    <h1>This site is <em>temporarily</em> offline.</h1>

    <div class="line"></div>

    <p>This website has been suspended. If you're the site owner, please reach out to resolve your account status.</p>

    <a href="mailto:hello@callahandigital.com" class="btn">
      Contact Us
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>

  <div class="footer-bar">
    <a href="#" class="footer-logo">
      <img src="logo.png" alt="Callahan Digital" />
      <span>Callahan Digital</span>
    </a>
    <span class="footer-right">&copy; 2025 Callahan Digital</span>
  </div>

</body>
</html>
